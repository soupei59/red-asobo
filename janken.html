    </div>

    <!-- 掛け声表示 -->
    <div class="call-text" id="call-text"></div>

    <!-- <ruby>手<rt>て</rt></ruby>ボタン -->

        <div class="hand-name">パー</div>
      </button>
    </div>

      <div style="display:flex; gap:12px; margin-top:10px; justify-content:center; flex-wrap:wrap;">

        <button type="button" class="btn small" id="end-btn" style="background:var(--sage); color:#fff;">おしまい</button>

    </div>

  "{name}〜ありがとう！<br>レッド、{name}と あそぶ<ruby>時間<rt>じかん</rt></ruby>が<br>いっちばん <ruby>好<rt>す</rt></ruby>きやねん〜",
  "またおいで〜{name}！<br>ちょっとだけでも、<br>ながーくでも、だいかんげいやで！",
  "バイバイ{name}！<br>むりせんと、<br>マイペースで また <ruby>来<rt>き</rt></ruby>てな〜！",
  "{name}、おおきに！<br>ええ<ruby>日<rt>ひ</rt></ruby>も、そうでもない<ruby>日<rt>ひ</rt></ruby>も、<br>レッドは いつでも ここにおるで",
  "じゃあね〜{name}！<br>レッドな、<ruby>今日<rt>きょう</rt></ruby> {name}と<br>あそべて めっちゃ うれしかってん！",
  "またな{name}〜！<br>レッド、{name}のこと<br>いつも おうえんしてるで〜！",
  "{name}、バイバイ〜！<br>つぎ <ruby>来<rt>き</rt></ruby>たときは<br>もっと おもしろいこと しよな〜！",
  "おおきに{name}！<br>レッドの<ruby>前<rt>まえ</rt></ruby>では、<br>いつでも そのままで おってな〜",
  "{name}！またあそぼ〜！<br>レッド、ここで<br>ず〜っと <ruby>待<rt>ま</rt></ruby>っとるからな〜！"
];

function fillName(str, name, h) { return str.replace(/\{name\}/g, name + (h || "")); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const name  = localStorage.getItem('red_name')  || 'きみ';
const honor = localStorage.getItem('red_honor') || '';

/* ===== Elements ===== */
const charWrap   = document.getElementById('char-wrap');
const charImg    = document.getElementById('char-img');
const bubble     = document.getElementById('bubble');
const bubbleText = document.getElementById('bubble-text');
const nextCue    = document.getElementById('next-cue');
const callText   = document.getElementById('call-text');
const handBtns   = document.querySelectorAll('.hand-btn');
const result     = document.getElementById('result');
const resultLabel= document.getElementById('result-label');
const againBtn   = document.getElementById('again-btn');
const endBtn     = document.getElementById('end-btn');
const scoreWin   = document.getElementById('score-win');
const scoreLose  = document.getElementById('score-lose');
const scoreDraw  = document.getElementById('score-draw');

let score = { win: 0, lose: 0, draw: 0 };
let phase = 'idle';        // idle | intro | call | wait | result
let introStep = 0;
let typing = false;
let typeTimer = null;
let currentFullText = '';

/* ===== タイプライター（ruby対応） ===== */
function tokenizeRuby(html) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html.startsWith('<ruby>', i)) {
      const end = html.indexOf('</ruby>', i) + 7;
      tokens.push(html.slice(i, end));
      i = end;
    } else if (html.startsWith('<br>', i)) {
      tokens.push('<br>');
      i += 4;
    } else {
      tokens.push(html[i]);
      i++;
    }
  }
  return tokens;
}
function typeWrite(text, speed = 55, onComplete) {
  if (typeTimer) clearInterval(typeTimer);
  const tokens = tokenizeRuby(text);
  bubbleText.innerHTML = '';
  nextCue.classList.add('hidden');
  currentFullText = text;
  typing = true;
  let i = 0;
  typeTimer = setInterval(() => {
    if (i < tokens.length) {
      i++;
      bubbleText.innerHTML = tokens.slice(0, i).join('');
    } else {
      clearInterval(typeTimer);
      typing = false;
      if (onComplete) onComplete();
    }
  }, speed);
}
function completeTyping() {
  if (!typing) return;
  clearInterval(typeTimer);
  bubbleText.innerHTML = currentFullText;
  typing = false;
}

/* ===== キャラ状態切替 ===== */
function setChar(pose, animClass) {
  charImg.src = `images/${pose}.png`;
  charWrap.className = 'character ' + (animClass || 'floating');
}

/* ===== <ruby>手<rt>て</rt></ruby>ボタン状態 ===== */
function setHandButtonsState(state) {
  // state: 'disabled' | 'ready'
  handBtns.forEach(b => {
    b.classList.remove('disabled', 'ready');
    b.classList.add(state);
  });
}

/* ===== イントロ進行 ===== */
let introTimer = null;
function showIntro(step) {
  introStep = step;
  setChar('normal', 'floating');
  bubble.classList.remove('hidden');
  callText.textContent = '';
  result.classList.add('hidden');
  setHandButtonsState('disabled');
  nextCue.classList.add('hidden');
  typeWrite(INTRO[step], 60, () => {
    // タイプ完了後、少し間を置いて自動で<ruby>次<rt>つぎ</rt></ruby>へ
    if (introTimer) clearTimeout(introTimer);
    introTimer = setTimeout(() => {
      if (introStep < INTRO.length - 1) {
        showIntro(introStep + 1);
      } else {
        startCall();
      }
    }, 1600);
  });
}

/* ===== じゃ〜ん け〜ん フェーズ ===== */
function startCall() {
  phase = 'call';
  setChar('tame', 'hopping');
  bubble.classList.add('hidden');
  nextCue.classList.add('hidden');
  result.classList.add('hidden');

  callText.innerHTML = '';
  setTimeout(() => {
    callText.innerHTML = '<span>じゃ〜ん</span>';
  }, 300);
  setTimeout(() => {
    callText.innerHTML = '<span>じゃ〜ん</span> <span>け〜ん</span>';
    setHandButtonsState('ready');
    phase = 'wait';
  }, 1100);
}

/* ===== ユーザーが<ruby>手<rt>て</rt></ruby>を選んだ瞬間 ===== */
handBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (phase !== 'wait') return;
    const player = btn.dataset.hand;
    const hands = ['gu','choki','pa'];
    const cpu = hands[Math.floor(Math.random() * 3)];

    setHandButtonsState('disabled');
    phase = 'pon';

    // ぽん！＋レッドの<ruby>手<rt>て</rt></ruby>公開
    callText.innerHTML = '<span style="font-size:1.3em">ぽん！</span>';
    setChar(cpu, 'hopping');

    // <ruby>勝<rt>か</rt></ruby>敗判定
    let outcome;
    if (player === cpu) outcome = 'draw';
    else if (
      (player === 'gu' && cpu === 'choki') ||
      (player === 'choki' && cpu === 'pa') ||
      (player === 'pa' && cpu === 'gu')
    ) outcome = 'win';
    else outcome = 'lose';

    setTimeout(() => showResult(outcome), 900);
  });
});

/* ===== 結果表示 ===== */
function showResult(outcome) {
  phase = 'result';
  callText.innerHTML = '';

  let labelText, labelClass, line, pose, animClass;
  if (outcome === 'win') {
    labelText = 'きみの かち〜！';
    labelClass = 'win';
    line  = pick(RED_LOSE);
    pose  = 'oshii';
    animClass = 'slumping';
    score.win++;
  } else if (outcome === 'lose') {
    labelText = 'きみの まけ〜';
    labelClass = 'lose';
    line  = pick(RED_WIN);
    pose  = Math.random() < 0.5 ? 'hai' : 'hai2';
    animClass = 'joyful';
    score.lose++;
  } else {
    labelText = 'あいこ〜！';
    labelClass = 'draw';
    line  = pick(DRAW);
    pose  = 'wakaru';
    animClass = 'tilting';
    score.draw++;
  }

  setChar(pose, animClass);
  bubble.classList.remove('hidden');
  typeWrite(fillName(line, name, honor), 45);

  resultLabel.textContent = labelText;
  resultLabel.className = 'result-label ' + labelClass;
  result.classList.remove('hidden');

  scoreWin.textContent = score.win;
  scoreLose.textContent = score.lose;
  scoreDraw.textContent = score.draw;
}


/* ===== もういっかい ===== */
againBtn.addEventListener('click', () => {
  result.classList.add('hidden');
  startCall();
});

/* ===== おしまい → bye.html へ ===== */
endBtn.addEventListener('click', () => {
  window.location.href = 'bye.html';
});

/* ===== 初回スタート ===== */
phase = 'intro';
showIntro(0);
</script>
</body>
</html>
