function fillName(str, n, h) { return str.replace(/\{name\}/g, n + (h || "")); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

/* ===== タイプライター（ruby + br 対応） ===== */
let typeTimer = null;
let typing = false;
let currentFullText = '';
const bubbleText = document.getElementById('bubble-text');

function tokenizeRuby(html) {
  const tokens = [];
  let i = 0;
  while (i < html.length) {
    if (html.startsWith('<ruby>', i)) {
      const end = html.indexOf('</ruby>', i) + 7;
      tokens.push(html.slice(i, end));
      i = end;
    } else if (html.startsWith('<br>', i)) {
      tokens.push('<br>');
      i += 4;
    } else {
      tokens.push(html[i]);
      i++;
    }
  }
  return tokens;
}
function typeWrite(text, speed = 70, onComplete) {
  if (typeTimer) clearInterval(typeTimer);
  const tokens = tokenizeRuby(text);
  bubbleText.innerHTML = '';
  currentFullText = text;
  typing = true;
  let i = 0;
  typeTimer = setInterval(() => {
    if (i < tokens.length) {
      i++;
      bubbleText.innerHTML = tokens.slice(0, i).join('');
    } else {
      clearInterval(typeTimer);
      typing = false;
      if (onComplete) onComplete();
    }
  }, speed);
}
function completeTyping() {
  if (!typing) return;
  clearInterval(typeTimer);
  bubbleText.innerHTML = currentFullText;
  typing = false;
}

/* ===== ゲーム開始 ===== */
function startGame() {
  const all = [...Array(RIDDLES.length).keys()];
  shuffle(all);
  questions = all.slice(0, NUM_QUESTIONS);
  currentQ = 0;
  scoreTotal.textContent = NUM_QUESTIONS;

  setChar('normal', 'floating');
  bubble.classList.remove('hidden');
  quizButtons.classList.add('hidden');
  nextButtons.classList.add('hidden');
  reactionButtons.classList.add('hidden');

  const intro = fillName(pick(INTROS), name, honor);
  typeWrite(intro, 70, () => {
    setTimeout(() => showQuestion(), 2000);
  });
}

/* ===== 問題表示 ===== */
function showQuestion() {
  hintUsed = false;
  currentQ++;
  scoreCur.textContent = currentQ;

  const riddle = RIDDLES[questions[currentQ - 1]];
  setChar('normal', 'floating');
  quizButtons.classList.remove('hidden');
  nextButtons.classList.add('hidden');
  reactionButtons.classList.add('hidden');
  hintBtn.style.display = '';
  answerBtn.style.display = '';

  const qText = "問題！<br><br>" + riddle.q;
  typeWrite(qText, 70);
}

/* ===== ヒント ===== */
hintBtn.addEventListener('click', () => {
  if (typing) { completeTyping(); return; }
  hintUsed = true;
  const riddle = RIDDLES[questions[currentQ - 1]];
  setChar('wakaru', 'tilting');
  hintBtn.style.display = 'none';

  const hintText = "ヒントやで〜！<br><br>" + riddle.hint;
  typeWrite(hintText, 70);
});

/* ===== <ruby>答<rt>こた</rt></ruby>え ===== */
answerBtn.addEventListener('click', () => {
  if (typing) { completeTyping(); return; }
  const riddle = RIDDLES[questions[currentQ - 1]];
  quizButtons.classList.add('hidden');

  setChar(Math.random() < 0.5 ? 'hai' : 'hai2', 'joyful');

  typeWrite(riddle.explain, 60, () => {
    /* 解説が終わったら感想ボタンを表示 */
    setTimeout(() => {
      reactionButtons.classList.remove('hidden');
    }, 600);
  });
});

/* ===== 感想ボタン共通処理 ===== */
function handleReaction(lines) {
  reactionButtons.classList.add('hidden');
  setChar('normal', 'floating');
  const msg = fillName(pick(lines), name, honor);
  typeWrite(msg, 70, () => {
    setTimeout(() => {
      nextButtons.classList.remove('hidden');
      if (currentQ >= NUM_QUESTIONS) {
        nextBtn.style.display = 'none';
      } else {
        nextBtn.style.display = '';
      }
    }, 600);
  });
}

reactEasy.addEventListener('click', () => handleReaction(REACT_EASY));
reactHard.addEventListener('click', () => handleReaction(REACT_HARD));
reactWow.addEventListener('click',  () => handleReaction(REACT_WOW));

/* ===== つぎの<ruby>問題<rt>もんだい</rt></ruby> ===== */
nextBtn.addEventListener('click', () => {
  nextButtons.classList.add('hidden');
  showQuestion();
});

/* ===== おしまい → bye.html へ ===== */
endBtn.addEventListener('click', () => {
  window.location.href = 'bye.html';
});

/* ===== バブルタップで早送り ===== */
bubble.addEventListener('click', () => {
  if (typing) completeTyping();
});

/* ===== 初回スタート ===== */
startGame();
